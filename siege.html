<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Galactic Siege | Visual Studio Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        body { background: #000; color: #00ff00; font-family: 'Orbitron'; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        /* Efeito de Tubo de Imagem Antigo (CRT) */
        .crt-overlay {
            position: absolute; width: 400px; height: 550px;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 2;
        }

        canvas { 
            background: #050805; border: 4px solid #111; 
            box-shadow: 0 0 20px #00ff0033; image-rendering: pixelated; 
        }

        .ui-panel { width: 400px; display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.8rem; }
        #wave { color: #00ff00; }
        .btn-back { margin-top: 15px; background: #003300; border: 1px solid #00ff00; color: #00ff00; padding: 8px 15px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <span>SCORE: <span id="score">0</span></span>
        <span>WAVE: <span id="wave">1</span></span>
    </div>

    <div style="position: relative;">
        <div class="crt-overlay"></div>
        <canvas id="gameCanvas" width="400" height="550"></canvas>
    </div>

    <button class="btn-back" onclick="window.location.href='index.html'">ABORT MISSION</button>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let score = 0;
    let wave = 1;
    let player = { x: 180, y: 480, w: 35, h: 30 };
    let bullets = [];
    let enemies = [];
    let keys = {};

    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function spawnWave() {
        for(let i=0; i < 5 + wave; i++) {
            enemies.push({
                x: Math.random() * 360,
                y: -50 - (i * 40),
                w: 30, h: 20,
                speed: 1.5 + (wave * 0.3),
                hp: 1
            });
        }
    }

    function update() {
        if(keys.ArrowLeft && player.x > 0) player.x -= 6;
        if(keys.ArrowRight && player.x < canvas.width - player.w) player.x += 6;
        
        // Tiro Automático rápido
        if(keys.Space && bullets.length < 15) {
            bullets.push({x: player.x + 15, y: player.y, w: 3, h: 12});
        }

        bullets.forEach((b, i) => {
            b.y -= 10;
            if(b.y < 0) bullets.splice(i, 1);
        });

        if(enemies.length === 0) {
            wave++;
            document.getElementById("wave").innerText = wave;
            spawnWave();
        }

        enemies.forEach((en, i) => {
            en.y += en.speed;
            
            // Colisão com Balas
            bullets.forEach((b, bi) => {
                if(b.x > en.x && b.x < en.x + en.w && b.y < en.y + en.h && b.y > en.y) {
                    enemies.splice(i, 1);
                    bullets.splice(bi, 1);
                    score += 10;
                    document.getElementById("score").innerText = score;
                }
            });

            // Perdeu se passar da linha de fundo
            if(en.y > canvas.height) {
                alert("SISTEMA INVADIDO! Score: " + score);
                location.reload();
            }
        });
    }

    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, 400, 550);

        // Estrelas
        ctx.fillStyle = "white";
        for(let i=0; i<10; i++) ctx.fillRect(Math.random()*400, Math.random()*550, 1, 1);

        // Player (Verde Retro)
        ctx.fillStyle = "#00ff00";
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.fillRect(player.x + 12, player.y - 10, 10, 10); // Ponta da nave

        // Balas
        ctx.fillStyle = "#fff";
        bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

        // Inimigos (Formas geométricas agressivas)
        ctx.fillStyle = "#ff0000";
        enemies.forEach(en => {
            ctx.beginPath();
            ctx.moveTo(en.x, en.y);
            ctx.lineTo(en.x + en.w, en.y);
            ctx.lineTo(en.x +
