<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meme Jump | Visual Studio Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        body { background: #050505; color: #ff9900; font-family: 'Orbitron'; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { background: #0a0a0a; border: 2px solid #333; border-radius: 5px; cursor: pointer; }
        .btn { margin-top: 15px; background: transparent; border: 1px solid #ff9900; color: #ff9900; padding: 10px 20px; cursor: pointer; font-family: 'Orbitron'; }
    </style>
</head>
<body>
    <h1>SCORE: <span id="score">0</span></h1>
    <canvas id="gameCanvas" width="320" height="480"></canvas>
    <button class="btn" onclick="window.location.href='index.html'">BACK TO HUB</button>

<script>
    const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d");
    let score = 0, gameActive = false, bird = { x: 50, y: 200, v: 0, r: 12 }, pipes = [];
    
    function createPipe() {
        let gap = 120, y = Math.random() * (canvas.height - gap - 100) + 50;
        pipes.push({ x: canvas.width, y: y, scored: false });
    }

    function update() {
        if (!gameActive) return;
        bird.v += 0.25; bird.y += bird.v;
        if (bird.y > canvas.height) reset();
        pipes.forEach((p, i) => {
            p.x -= 2;
            if (!p.scored && bird.x > p.x + 50) { score++; p.scored = true; document.getElementById("score").innerText = score; }
            if (bird.x + bird.r > p.x && bird.x - bird.r < p.x + 50 && (bird.y - bird.r < p.y || bird.y + bird.r > p.y + 120)) reset();
            if (p.x < -50) pipes.splice(i, 1);
        });
        if (pipes.length === 0 || pipes[pipes.length-1].x < canvas.width - 180) createPipe();
    }

    function draw() {
        ctx.fillStyle = "#0a0a0a"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#39FF14"; pipes.forEach(p => { ctx.fillRect(p.x, 0, 50, p.y); ctx.fillRect(p.x, p.y + 120, 50, canvas.height); });
        ctx.fillStyle = "#ff9900"; ctx.beginPath(); ctx.arc(bird.x, bird.y, bird.r, 0, Math.PI*2); ctx.fill();
        if(!gameActive) { ctx.fillStyle = "white"; ctx.fillText("CLICK TO START", 100, 240); }
    }

    function reset() { bird.y = 200; bird.v = 0; pipes = []; score = 0; gameActive = false; }
    canvas.addEventListener("click", () => { if(!gameActive) gameActive = true; bird.v = -4.5; });
    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();
</script>
</body>
</html>
