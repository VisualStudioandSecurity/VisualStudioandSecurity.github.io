<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Vanguards Visual | Agency</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;800&display=swap');
        body { background: #fff; color: #000; font-family: 'Inter', sans-serif; }
        .container { padding: 50px 10%; }
        .tag-row { display: flex; gap: 10px; margin: 30px 0; flex-wrap: wrap; }
        .tag { padding: 8px 20px; border: 1px solid #eee; border-radius: 50px; font-size: 0.8rem; cursor: pointer; transition: 0.3s; }
        .tag:hover, .tag.active { background: #000; color: #fff; border-color: #000; }
        .project-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .project-box { height: 300px; background: #f9f9f9; border-radius: 20px; display: flex; align-items: flex-end; padding: 30px; transition: 0.5s; cursor: pointer; }
        .project-box:hover { background: #f0f0f0; transform: translateY(-10px); }
        .btn-contact { padding: 15px 40px; background: #000; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: 800; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" style="color: #888; text-decoration: none; font-size: 0.8rem;">← VOLTAR AO HUB</a>
        <h1 style="font-size: 4rem; margin-top: 20px;">Vanguards <br> <span style="color: #666;">Visual Studio</span></h1>
        
        <div class="tag-row">
            <div class="tag active">ALL PROJECTS</div>
            <div class="tag">UI/UX DESIGN</div>
            <div class="tag">WEB DEVELOPMENT</div>
            <div class="tag">BRANDING</div>
            <div class="tag">GAME ASSETS</div>
            <div class="tag">3D RENDERS</div>
        </div>

        <div class="project-grid">
            <div class="project-box"><h3>Project_01.exe</h3></div>
            <div class="project-box"><h3>Project_02.png</h3></div>
        </div>

        <div style="margin-top: 50px; text-align: center;">
            <button class="btn-contact">INICIAR UM PROJETO AGORA</button>
        </div>
    </div>
</body>
</html>
