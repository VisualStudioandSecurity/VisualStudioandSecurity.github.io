<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Studio Games | Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { background: #050505; color: white; font-family: 'Orbitron', sans-serif; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* TELAS */
        #screen-entry { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; position: absolute; background: #050505; z-index: 10; }
        #screen-hub { display: none; flex-direction: column; width: 100%; height: 100%; background: #0a0a0a; padding: 20px; box-sizing: border-box; overflow-y: auto; }

        /* DESIGN LOGIN */
        .login-box { border: 1px solid #333; padding: 40px; border-radius: 10px; text-align: center; background: #111; width: 320px; box-shadow: 0 0 20px rgba(57, 255, 20, 0.1); }
        h1 { color: #39FF14; font-size: 1.2rem; margin-bottom: 30px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        
        .login-btn { width: 100%; padding: 15px; background: #39FF14; color: black; border: none; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; margin-top: 10px; }
        .login-btn:hover { box-shadow: 0 0 15px #39FF14; }

        /* GRID DO HUB */
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 50px; width: 100%; max-width: 1000px; align-self: center; }
        .game-card { background: #181818; border: 1px solid #333; padding: 15px; border-radius: 8px; text-align: center; transition: 0.3s; }
        .game-card:hover { border-color: #39FF14; }
        .thumb { height: 100px; background: linear-gradient(45deg, #000, #222); margin-bottom: 10px; border-radius: 4px; }
        .play-btn { background: transparent; border: 1px solid #39FF14; color: #39FF14; padding: 8px; width: 100%; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="screen-entry">
        <div class="login-box">
            <h1>VISUAL STUDIO GAMES</h1>
            <input type="text" placeholder="USER ID">
            <input type="password" placeholder="PASSCODE">
            <button class="login-btn" onclick="entrar()">ENTER SYSTEM</button>
        </div>
    </div>

    <div id="screen-hub">
        <h2 style="color: #39FF14; font-size: 1rem; border-bottom: 1px solid #333; padding-bottom: 10px;">KOVALIOSKY | PROJECTS DRIVE</h2>
        
        <div class="games-grid">
            <div class="game-card">
                <div class="thumb" style="background: linear-gradient(45deg, #000, #39FF14);"></div>
                <h3>SNAKE</h3>
                <button class="play-btn" onclick="window.location.href='./snake.html'">LAUNCH</button>
            </div>
            <div class="game-card">
                <div class="thumb" style="background: linear-gradient(45deg, #000, #d4008d);"></div>
                <h3>DRIFT</h3>
                <button class="play-btn" onclick="window.location.href='./carro.html'">LAUNCH</button>
            </div>
            <div class="game-card">
                <div class="thumb" style="background: linear-gradient(45deg, #000, #ff9900);"></div>
                <h3>MEME</h3>
                <button class="play-btn" onclick="window.location.href='./meme.html'">LAUNCH</button>
            </div>
            <div class="game-card">
                <div class="thumb" style="background: linear-gradient(45deg, #000, #00d4ff);"></div>
                <h3>SPACE</h3>
                <button class="play-btn" onclick="window.location.href='./espaco.html'">LAUNCH</button>
            </div>
            <div class="game-card">
                <div class="thumb" style="background: linear-gradient(45deg, #000, #ff3300);"></div>
                <h3>SIEGE</h3>
                <button class="play-btn" onclick="window.location.href='./siege.html'">LAUNCH</button>
            </div>
        </div>
    </div>

    <script>
        function entrar() {
            document.getElementById('screen-entry').style.display = 'none';
            document.getElementById('screen-hub').style.display = 'flex';
        }
    </script>
</body>
</html>
