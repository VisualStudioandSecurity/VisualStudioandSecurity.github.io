<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kovaliosky | Vanguard Core</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; }

        /* Splash Screen (image_e8575a.png) */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #39FF14; transition: 0.5s; }

        /* Hub Content (image_e7e717.png) */
        #hub-screen { display: none; width: 90%; max-width: 1100px; flex-direction: column; align-items: center; z-index: 10; }
        .chroma { color: #39FF14; text-shadow: 0 0 20px #39FF14; margin-bottom: 40px; letter-spacing: 8px; font-size: 1.8rem; }

        /* Grid de Operações */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; width: 100%; }
        .card { background: rgba(5, 5, 5, 0.8); border: 1px solid #1a1a1a; padding: 30px; border-radius: 10px; transition: 0.4s; }
        .card-sec { border-color: #ff3131; }
        .card-sol { border-color: #39FF14; }

        /* Botões */
        .btn-inner { background: none; border: 1px solid #333; color: #666; padding: 12px; width: 100%; margin-top: 10px; font-family: 'Orbitron'; font-size: 0.6rem; transition: 0.3s; cursor: pointer; }
        .btn-inner:hover { border-color: #fff; color: #fff; background: rgba(255,255,255,0.05); }
        .active-btn { border-color: #39FF14; color: #39FF14; text-shadow: 0 0 5px #39FF14; }

        /* Botão Principal */
        .main-action { background: #39FF14; color: #000; font-weight: bold; margin-top: 50px; width: 350px; border: none; padding: 20px; font-size: 0.9rem; letter-spacing: 3px; box-shadow: 0 0 20px #39FF14; transition: 0.3s; cursor: pointer; }
        .main-action:hover { background: #fff; transform: scale(1.05); }

        .footer { margin-top: 40px; display: flex; gap: 40px; color: #222; font-size: 0.7rem; text-transform: uppercase; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="splash" onclick="unlock()">
        <p style="font-family: 'JetBrains Mono';">> INITIALIZING_SECURE_VANGUARD_BOOT...</p>
        <p style="font-size: 0.4rem; color: #111; margin-top: 10px;">AUTH: KOVALIOSKY_DEV // [ ENCRYPTED_SESSION ]</p>
    </div>

    <div id="hub-screen">
        <h1 class="chroma">VANGUARD_CORE_HUB</h1>
        
        <div class="grid">
            <div class="card card-sec">
                <p style="color: #ff3131; font-size: 0.6rem; text-align: center; margin-bottom: 20px;">SECURITY_SHIELD</p>
                <p style="color: #ff3131; font-family: 'JetBrains Mono'; font-size: 0.5rem; text-align: center;">> STATUS: PROTECTED</p>
                <button class="btn-inner" style="border-color: #ff3131; color: #ff3131; margin-top: 30px;">RUN_SCAN</button>
            </div>

            <div class="card card-sol">
                <p style="color: #39FF14; font-size: 0.6rem; text-align: center; margin-bottom: 20px;">SOLUTIONS</p>
                <button class="btn-inner active-btn" onclick="copiarPix()">PAYMENT_GATE (COPY PIX)</button>
                <button class="btn-inner" onclick="location.href='https://wa.me/5569992636349'">CLEAN_UI_DESIGN</button>
            </div>
        </div>

        <button class="main-action" onclick="location.href='https://wa.me/5569992636349'">CONTRATAR AGORA</button>

        <div class="footer">
            <span>Guilherme Kovaliosky</span>
            <span>Senior Software Engineer</span>
        </div>
    </div>

    <script>
        function unlock() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('hub-screen').style.display = 'flex';
            }, 500);
        }

        // Função para facilitar o pagamento via Pix
        function copiarPix() {
            const pix = "10267545266";
            navigator.clipboard.writeText(pix).then(() => {
                alert("Chave Pix copiada: " + pix + "\nUse no seu app de banco para realizar o pagamento.");
            });
        }
    </script>
</body>
</html>
