<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kovaliosky | Visual Designer & Dev</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Orbitron', sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* ----- 1. NOVA TELA DE CARREGAMENTO (SPLASH) ----- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; color: #39FF14;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; /* No topo de tudo */
            font-family: 'JetBrains Mono', monospace; font-size: 0.9rem;
            transition: opacity 0.8s ease-out; /* Animação de sumir */
        }

        /* ANIMAÇÃO DE TYPING NO SPLASH */
        @keyframes typing { from { width: 0; } to { width: 100%; } }
        @keyframes blink { from { border-color: transparent; } to { border-color: #39FF14; } }
        
        .typewriter {
            display: inline-block; overflow: hidden; white-space: nowrap;
            border-right: 3px solid #39FF14; animation: typing 3s steps(40, end), blink .75s step-end infinite;
        }

        /* ----- ESTILOS GERAIS ----- */
        .screen {
            display: none; width: 100%; height: 100vh;
            flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
            position: absolute; top: 0; left: 0;
        }

        .chroma { color: #39FF14; text-shadow: 0 0 10px #39FF14; margin-bottom: 20px; font-size: 1.2rem; }

        /* GRID ATUALIZADA (SUPORTA 5 EXEMPLOS) */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; width: 100%; max-width: 900px; margin-top: 20px; 
        }

        .card { background: #111; border: 1px solid #222; padding: 15px; border-radius: 8px; }

        /* BOTÕES ATUALIZADOS */
        .btn-main { 
            width: 100%; max-width: 250px; padding: 15px; 
            background: #fff; color: #000; border: none; 
            font-weight: bold; cursor: pointer; margin-top: 10px; font-family: 'Orbitron';
        }
        .btn-main:hover { background: #39FF14; transform: scale(1.02); }

        .btn-nav { 
            background: none; border: 1px solid #444; color: #888; 
            padding: 10px; cursor: pointer; width: 100%; margin-top: 5px; font-size: 0.7rem; font-family: 'Orbitron';
        }
        .btn-nav:hover { border-color: #fff; color: #fff; }

        input { 
            width: 100%; max-width: 250px; padding: 12px; 
            background: #111; border: 1px solid #333; color: #fff; 
            text-align: center; margin-bottom: 10px; font-family: 'Orbitron';
        }
    </style>
</head>
<body onload="bootSystem()">

    <div id="splash-screen">
        <p class="typewriter">> INITIATING_BOOT_PROTOCOL.EXE...</p>
        <p style="margin-top: 10px;">DECRYPTING VANGUARD_HUB_1.0</p>
        <p style="font-size: 0.7rem; color: #666; margin-top: 20px;">[ KOVALIOSKY_DESIGN_NET ]</p>
    </div>

    <div id="login-screen" class="screen" style="display: flex;">
        <h1 class="chroma">VISUAL STUDIO GAMES</h1>
        <input type="password" id="passInput" placeholder="PASSWORD">
        <button type="button" class="btn-main" onclick="unlock()">ENTER SYSTEM</button>
    </div>

    <div id="hub-screen" class="screen">
        <h2 class="chroma" style="font-size: 0.8rem; letter-spacing: 2px;">VANGUARD_HUB</h2>
        <div class="grid">
            <div class="card"><h3>SNAKE</h3><button class="btn-nav" onclick="window.location.href='snake.html'">LAUNCH</button></div>
            <div class="card"><h3>DRIFT</h3><button class="btn-nav" onclick="window.location.href='carro.html'">LAUNCH</button></div>
            
            <div class="card" style="border: 1px solid #00d4ff; background: rgba(0, 212, 255, 0.05); grid-column: span 1;">
                <h3 style="color:#00d4ff; font-size:0.8rem; margin-bottom: 5px;">SAMPLES_V2</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                    <button class="btn-nav" style="color:#39FF14; border-color:#39FF14; margin:0;" onclick="window.location.href='exemplo1.html'">DARK</button>
                    <button class="btn-nav" style="color:#007bff; border-color:#007bff; margin:0;" onclick="window.location.href='exemplo2.html'">BUSINESS</button>
                    <button class="btn-nav" style="color:#fff; border-color:#fff; margin:0;" onclick="window.location.href='exemplo3.html'">APPLE</button>
                    <button class="btn-nav" style="color:#ff9900; border-color:#ff9900; margin:0;" onclick="window.location.href='exemplo4.html'">CRYPTO</button>
                    <button class="btn-nav" style="color:#ff3131; border-color:#ff3131; margin:0; grid-column: span 2;" onclick="window.location.href='exemplo5.html'">AGENCY_3.0</button>
                </div>
            </div>

            <div class="card" style="border: 1px solid; animation: chroma 3s infinite linear;">
                <h3 style="font-size: 0.8rem;">CONTACT_DEV</h3>
                <button class="btn-main" style="font-size:0.6rem; padding: 10px; max-width: 100%;" onclick="window.location.href='https://wa.me/5569992636349'">HIRE_NOW</button>
            </div>
        </div>
        <button class="btn-nav" style="width: auto; margin-top: 20px;" onclick="location.reload()">LOGOUT</button>
    </div>

    <script>
        // Função do Splash Screen
        function bootSystem() {
            console.log("Sistema Iniciado.");
            // Aguarda 3.5 segundos e faz o splash sumir
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                // Remove o splash completamente após a animação
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                }, 800);
            }, 3500); 
        }

        function unlock() {
            // Esconde o Login e Mostra o Hub
            document.getElementById('login-screen').style.setProperty('display', 'none', 'important');
            document.getElementById('hub-screen').style.setProperty('display', 'flex', 'important');
        }

        // Atalho tecla Enter no login
        document.getElementById('passInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') unlock();
        });
    </script>
</body>
</html>
