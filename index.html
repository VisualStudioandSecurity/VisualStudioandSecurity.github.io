<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kovaliosky | Visual Designer & Dev</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background: #000; color: #fff; font-family: 'Orbitron', sans-serif; 
            height: 100vh; width: 100vw; overflow-x: hidden;
        }

        @keyframes chroma {
            0% { color: #39FF14; text-shadow: 0 0 10px #39FF14; }
            50% { color: #00d4ff; text-shadow: 0 0 10px #00d4ff; }
            100% { color: #39FF14; text-shadow: 0 0 10px #39FF14; }
        }
        .chroma { animation: chroma 4s infinite linear; }

        /* TELAS */
        .layer {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; min-height: 100vh; padding: 20px;
        }

        #login-screen { justify-content: center; position: fixed; top: 0; left: 0; z-index: 1000; background: #000; }
        #hub-screen { display: none; background: #050505; }
        #profile-screen { display: none; background: #080808; padding-top: 40px; }

        /* GRID */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; width: 100%; max-width: 1100px; margin-top: 30px; 
        }
        .card { background: #111; border: 1px solid #222; padding: 20px; border-radius: 8px; text-align: center; }

        /* BOTÕES */
        .btn-main { width: 100%; max-width: 300px; padding: 15px; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; margin-top: 15px; }
        .btn-main:hover { background: #39FF14; }
        .btn-nav { background: none; border: 1px solid #444; color: #888; padding: 10px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; width: 100%; margin-top: 5px; }
        
        input { width: 100%; max-width: 300px; padding: 12px; background: #000; border: 1px solid #333; color: #fff; outline: none; text-align: center; font-family: 'Orbitron'; }

        .cv-container { max-width: 800px; width: 100%; background: #0c0c0c; border-left: 3px solid #00d4ff; padding: 30px; font-family: 'JetBrains Mono'; }
        .skill-tag { display: inline-block; padding: 5px 10px; border: 1px solid #00d4ff; color: #00d4ff; font-size: 0.7rem; margin: 5px; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="login-screen" class="layer">
        <div style="text-align: center;">
            <h1 class="chroma" style="font-size: 1.2rem; margin-bottom: 20px;">VISUAL STUDIO GAMES</h1>
            <input type="password" placeholder="PASSWORD">
            <br>
            <button class="btn-main" onclick="unlock()">ENTER SYSTEM</button>
        </div>
    </div>

    <div id="hub-screen" class="layer">
        <div style="width:100%; max-width:1100px; display:flex; justify-content:space-between; border-bottom:1px solid #222; padding-bottom:10px;">
            <h2 class="chroma" style="font-size: 0.8rem;">HUB_PRINCIPAL</h2>
            <button class="btn-nav" style="width:auto; color:#00d4ff;" onclick="showProfile()">MY_PROFILE</button>
        </div>

        <div class="grid">
            <div class="card"><h3>SNAKE</h3><button class="btn-nav" onclick="window.location.href='snake.html'">LAUNCH</button></div>
            <div class="card"><h3>DRIFT</h3><button class="btn-nav" onclick="window.location.href='carro.html'">LAUNCH</button></div>
            
            <div class="card" style="border-color: #00d4ff;">
                <h3 style="color:#00d4ff;">SAMPLES</h3>
                <button class="btn-nav" style="color:#39FF14;" onclick="window.location.href='exemplo1.html'">DARK_NEON</button>
