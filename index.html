<!doctype html>
<html lang="pt-br" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kovaliosky DeV | Senior Developer & Graphic Designer</title>
  <meta name="description" content="Portfólio de Guilherme (Kovaliosky DeV), especialista em Desenvolvimento Senior, Design Gráfico e Segurança Cibernética.">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
  
  <style>
    :root { --primary: #ffffff; --accent: #00f2ff; --bg-dark: #050505; --card-bg: #0d0d0d; }
    html, body { height: 100%; background-color: var(--bg-dark); color: var(--primary); font-family: 'Inter', sans-serif; scroll-behavior: smooth; margin: 0; }
    .gradient-text { background: linear-gradient(90deg, #fff, #00f2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .glass-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; }
    .glass-card:hover { border-color: var(--accent); transform: scale(1.03); }
    .btn-primary { background-color: var(--accent); color: var(--bg-dark); font-weight: 600; padding: 0.625rem 1.5rem; border-radius: 9999px; text-decoration: none; display: inline-block; }
    .skill-tag { background: rgba(0, 242, 255, 0.08); border: 1px solid rgba(0, 242, 255, 0.2); color: var(--accent); padding: 0.375rem 0.875rem; border-radius: 9999px; font-size: 0.8rem; }
    .animate-in { animation: fadeInUp 0.6s ease forwards; opacity: 0; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

<body class="antialiased h-full">
  <div id="app-wrapper" class="w-full h-full overflow-auto">
    <section class="relative py-20 md:py-32">
      <div class="max-w-5xl mx-auto px-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
          <div class="animate-in">
            <h1 class="text-4xl md:text-5xl font-bold leading-tight mb-4">Olá, eu sou <span class="gradient-text">Guilherme Kovaliosky</span></h1>
            <p class="text-lg mb-6 text-gray-300">Senior Developer, Designer e especialista em Cibersegurança.</p>
            <div class="flex gap-4">
              <a href="#projects" class="btn-primary">Projetos</a>
              <a href="#contact" class="px-6 py-2 border border-cyan-400 text-cyan-400 rounded-full">Contato</a>
            </div>
          </div>
          <div class="animate-in flex justify-center">
            <div class="w-56 h-56 rounded-full border-2 border-cyan-400/30 flex items-center justify-center bg-gray-900">
              <span class="text-6xl font-extrabold gradient-text">GK</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="py-16" id="skills">
      <div class="max-w-5xl mx-auto px-6 text-center">
        <h2 class="text-3xl font-bold mb-10 gradient-text">Habilidades</h2>
        <div class="flex flex-wrap justify-center gap-3">
          <span class="skill-tag">Pentest</span>
          <span class="skill-tag">Cybersecurity</span>
          <span class="skill-tag">React</span>
          <span class="skill-tag">Python</span>
          <span class="skill-tag">Node.js</span>
        </div>
      </div>
    </section>

    <footer class="py-8 border-t border-white/5 text-center text-gray-500 text-sm">
      © 2026 Kovaliosky DeV. Protegido por Visual Studio & Security.
    </footer>
  </div>

  <script>
    // 1. Bloqueio de Teclas de Atalho (F12, Ctrl+Shift+I, etc)
    document.addEventListener('keydown', function(e) {
        if (e.keyCode == 123 || 
            (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || 
            (e.ctrlKey && e.keyCode == 85)) {
            e.preventDefault();
            return false;
        }
    });

    // 2. Bloqueio de Botão Direito
    document.addEventListener('contextmenu', e => e.preventDefault());

    // 3. Trap de Debugger (Anti-Console)
    (function() {
        const tracker = function() {
            const start = new Date();
            debugger; 
            const end = new Date();
            if (end - start > 100) {
                window.location.href = "about:blank";
            }
        };
        setInterval(tracker, 1000);
    })();

    // 4. Detecção de Redimensionamento (Console Lateral)
    window.addEventListener('resize', function() {
        if ((window.outerHeight - window.innerHeight) > 200 || (window.outerWidth - window.innerWidth) > 200) {
            document.body.innerHTML = "<div style='background:#000;color:red;height:100vh;display:flex;align-items:center;justify-content:center;font-family:monospace;'><h1>ACESSO NEGADO: DEVTOOLS DETECTADO</h1></div>";
        }
    });
  </script>
</body>
</html>
